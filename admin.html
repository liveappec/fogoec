<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FOGO Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="app">
  <section class="hero-card">

    <div class="logo-box">
      <img src="logo-fogo-compacto.png" alt="FOGO" class="logo">
    </div>

    <h1>Panel Admin</h1>
    <p class="subtitle">Gestión de reservas FOGO</p>

    <div id="loginBox">
      <label>Clave de administrador</label>
      <input type="password" id="adminPassword" placeholder="Ingresa la clave">
      <button onclick="loginAdmin()">Ingresar</button>
    </div>

    <div id="adminBox" class="hidden">

      <label>Filtrar por fecha</label>
      <input type="date" id="fechaAdmin">

      <button onclick="cargarReservasPorFecha()">Ver reservas de esta fecha</button>
      <button class="admin-link" onclick="cargarTodasReservas()">Ver todas las reservas</button>

      <div id="adminStatus" class="status-box">
        Puedes ver todas las reservas o filtrar por fecha.
      </div>

      <div id="listaReservas"></div>

      <button class="admin-link" onclick="window.location.href='index.html'">
        Volver a reservas
      </button>

    </div>

  </section>
</main>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNgxo9xzZRWnYzDbGCg5TKDC0G5TwMnXW5tr71ZK2lX-NgEEOdneoj0jHTv48MG-ehkQ/exec";
const ADMIN_PASSWORD = "FOGO2026123456789";

function loginAdmin() {
  const pass = document.getElementById("adminPassword").value.trim();

  if (pass !== ADMIN_PASSWORD) {
    alert("Clave incorrecta");
    return;
  }

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("adminBox").classList.remove("hidden");
}

async function cargarTodasReservas() {
  await cargarReservas("");
}

async function cargarReservasPorFecha() {
  const fecha = document.getElementById("fechaAdmin").value;

  if (!fecha) {
    alert("Selecciona una fecha");
    return;
  }

  await cargarReservas(fecha);
}

async function cargarReservas(fechaFiltro) {
  const status = document.getElementById("adminStatus");
  const lista = document.getElementById("listaReservas");

  status.innerHTML = "Cargando reservas...";
  lista.innerHTML = "";

  try {
    const response = await fetch(`${WEB_APP_URL}?action=reservas`);
    const data = await response.json();

    if (!data.ok) {
      status.innerHTML = "No se pudieron cargar las reservas.";
      return;
    }

    let reservas = data.reservas || [];

    if (fechaFiltro) {
      reservas = reservas.filter(r => String(r.FECHA_RESERVA).trim() === fechaFiltro);
    }

    if (reservas.length === 0) {
      status.innerHTML = fechaFiltro
        ? "No hay reservas para esta fecha."
        : "No hay reservas registradas.";
      return;
    }

    reservas.sort((a, b) => {
      return String(a.FECHA_RESERVA + a.HORA_RESERVA).localeCompare(String(b.FECHA_RESERVA + b.HORA_RESERVA));
    });

    status.innerHTML = `${reservas.length} reserva(s) encontrada(s)`;

    lista.innerHTML = reservas.map(r => crearCardReserva(r)).join("");

  } catch (error) {
    status.innerHTML = "Error de conexión.";
  }
}

function crearCardReserva(r) {
  const estado = r.ESTADO || "SIN ESTADO";

  return `
    <div class="reserva-card">
      <div class="reserva-top">
        <strong>${r.FECHA_RESERVA || ""} · ${r.HORA_RESERVA || ""}</strong>
        <span class="estado ${claseEstado(estado)}">${estado}</span>
      </div>

      <p><strong>Código:</strong> ${r.CODIGO_RESERVA || ""}</p>
      <p><strong>Cliente:</strong> ${r.NOMBRE_COMPLETO || ""}</p>
      <p><strong>Cédula:</strong> ${r.CEDULA || ""}</p>
      <p><strong>Celular:</strong> ${r.CELULAR || ""}</p>
      <p><strong>Personas:</strong> ${r.PERSONAS || ""}</p>
      <p><strong>Turno:</strong> ${r.TURNO || ""}</p>
      <p><strong>Observaciones:</strong> ${r.OBSERVACIONES || "Sin observaciones"}</p>

      <div class="admin-actions">
        <button onclick="cambiarEstado('${r.CODIGO_RESERVA}', 'CONFIRMADA')">Confirmar</button>
        <button onclick="cambiarEstado('${r.CODIGO_RESERVA}', 'CANCELADA')">Cancelar</button>
        <button onclick="cambiarEstado('${r.CODIGO_RESERVA}', 'NO SHOW')">No show</button>
        <button onclick="cambiarEstado('${r.CODIGO_RESERVA}', 'LIBERADA')">Liberar mesa</button>
      </div>
    </div>
  `;
}

function claseEstado(estado) {
  if (estado === "CONFIRMADA") return "estado-confirmada";
  if (estado === "CANCELADA") return "estado-cancelada";
  if (estado === "NO SHOW") return "estado-noshow";
  if (estado === "LIBERADA") return "estado-liberada";
  return "";
}

async function cambiarEstado(codigoReserva, estado) {
  const confirmar = confirm(`¿Cambiar la reserva ${codigoReserva} a ${estado}?`);

  if (!confirmar) return;

  try {
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "actualizarEstado",
        adminPassword: ADMIN_PASSWORD,
        codigoReserva,
        estado
      })
    });

    const result = await response.json();

    if (!result.ok) {
      alert(result.message || "No se pudo actualizar la reserva.");
      return;
    }

    alert("Reserva actualizada correctamente.");
    cargarTodasReservas();

  } catch (error) {
    alert("Error de conexión.");
  }
}
</script>

</body>
</html>
