<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FOGO Reservas</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <img src="logo-fogo.png" class="logo">

  <h1>Reservar mesa</h1>

  <!-- PERSONAS -->
  <label>Personas</label>
  <select id="personas">
    <option value="">Seleccionar</option>
    <option>2</option><option>3</option><option>4</option>
    <option>5</option><option>6</option><option>7</option>
    <option>8</option><option>10</option>
  </select>

  <!-- FECHA -->
  <label>Fecha</label>
  <input type="date" id="fecha">

  <!-- HORA -->
  <label>Hora</label>
  <input type="time" id="hora">

  <!-- DISPONIBILIDAD -->
  <div id="disponibilidad"></div>

  <!-- DATOS -->
  <div id="formDatos" style="display:none;">

    <label>Nombre</label>
    <input type="text" id="nombre">

    <label>Cédula</label>
    <input type="text" id="cedula">

    <label>Celular</label>
    <input type="text" id="celular">

    <label>Instagram (opcional)</label>
    <input type="text" id="instagram">

    <label>Observaciones</label>
    <textarea id="observaciones"></textarea>

    <button onclick="crearReserva()">Confirmar Reserva</button>

  </div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNgxo9xzZRWnYzDbGCg5TKDC0G5TwMnXW5tr71ZK2lX-NgEEOdneoj0jHTv48MG-ehkQ/exec";

document.getElementById("hora").addEventListener("change", verificarDisponibilidad);
document.getElementById("fecha").addEventListener("change", verificarDisponibilidad);

async function verificarDisponibilidad() {
  const fecha = document.getElementById("fecha").value;
  const hora = document.getElementById("hora").value;

  if (!fecha || !hora) return;

  const res = await fetch(`${WEB_APP_URL}?action=disponibilidad&fecha=${fecha}&hora=${hora}`);
  const data = await res.json();

  const div = document.getElementById("disponibilidad");
  const form = document.getElementById("formDatos");

  if (data.mesasDisponibles > 0) {
    div.innerHTML = `<p>${data.mesasDisponibles} mesas disponibles</p>`;
    form.style.display = "block";
  } else {
    div.innerHTML = `
      <p>No hay mesas disponibles</p>
      <p>${data.proximaLiberacionTexto}</p>
      <a href="https://wa.me/593984890621">Contactar por WhatsApp</a>
    `;
    form.style.display = "none";
  }
}

async function crearReserva() {

  const data = {
    action: "crearReserva",
    nombreCompleto: document.getElementById("nombre").value,
    cedula: document.getElementById("cedula").value,
    celular: document.getElementById("celular").value,
    instagram: document.getElementById("instagram").value,
    personas: document.getElementById("personas").value,
    fechaReserva: document.getElementById("fecha").value,
    horaReserva: document.getElementById("hora").value,
    observaciones: document.getElementById("observaciones").value
  };

  const res = await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.ok) {
    alert("Reserva confirmada");

    window.open(`https://wa.me/593984890621?text=${encodeURIComponent(result.waFull)}`);
  } else {
    alert(result.message);
  }
}

</script>

</body>
</html>
