<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FOGO Reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="app">

    <section class="hero-card">
      <div class="logo-box">
        <img src="logo-fogo.png" alt="FOGO Restaurante" class="logo">
      </div>

      <h1>Reserva tu mesa</h1>
      <p class="subtitle">FOGO Restaurante Ibarra · Comer es vida</p>

      <div class="form-box">

        <label>Personas</label>
        <select id="personas">
          <option value="">Seleccionar</option>
          <option value="2">2 personas</option>
          <option value="3">3 personas</option>
          <option value="4">4 personas</option>
          <option value="5">5 personas</option>
          <option value="6">6 personas</option>
          <option value="7">7 personas</option>
          <option value="8">8 personas</option>
          <option value="10">10 personas</option>
          <option value="15">Más de 15 personas</option>
        </select>

        <label>Fecha</label>
        <input type="date" id="fecha">

        <label>Hora</label>
        <div id="horasBox" class="horas-box">
          <p class="mini-text">Primero selecciona una fecha.</p>
        </div>

        <input type="hidden" id="hora">

        <div id="disponibilidad" class="status-box">
          Selecciona fecha y hora para ver disponibilidad.
        </div>

        <div id="formDatos" class="datos-box hidden">

          <label>Nombre completo</label>
          <input type="text" id="nombre">

          <label>Cédula</label>
          <input type="text" id="cedula">

          <label>Celular</label>
          <input type="text" id="celular">

          <label>Instagram opcional</label>
          <input type="text" id="instagram">

          <label>Observaciones</label>
          <textarea id="observaciones"></textarea>

          <button onclick="crearReserva()">Confirmar reserva</button>
        </div>

      </div>

      <button class="admin-link" onclick="window.location.href='admin.html'">
        Ingresar como administrador
      </button>

      <p class="address">
        En el Rosal de las Malvinas, tras la Loma de Guayabillas, Ibarra Ecuador
      </p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
